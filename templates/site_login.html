{% extends "base.html" %}

{% block title %}Login — The Content Tracker{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 53px); padding: 48px; text-align: center;">

    <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 32px;">Enter password</h1>

    <form method="POST" style="max-width: 300px; width: 100%;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
            <input type="password" class="form-control" name="password" placeholder="Password" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100">Enter</button>
    </form>

</div>
{% endblock %}
