{% extends "base.html" %}

{% block title %}The Content Tracker{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 53px); padding: 48px; text-align: center;">

    <!-- Hero -->
    <div style="max-width: 600px; margin-bottom: 48px;">
        <h1 style="font-size: 48px; font-weight: 700; line-height: 1.1; margin-bottom: 20px;">Know what to publish next.</h1>
        <p style="font-size: 16px; color: var(--ct-text); line-height: 1.6; max-width: 480px; margin: 0 auto;">
            Tracks what performs in search and tells you what to publish next — backed by real data, not guesswork.
        </p>
    </div>

    <!-- Buttons -->
    <div style="display: flex; gap: 12px;">
        <a href="{{ url_for('clients_page') }}" class="btn btn-primary" style="padding: 14px 32px; text-decoration: none;">Sign in</a>
        <a href="{{ url_for('manual') }}" class="ct-btn-outline" style="text-decoration: none; display: inline-flex; align-items: center;">Read the manual</a>
    </div>

    <!-- Footer tagline -->
    <p style="position: fixed; bottom: 24px; font-size: 12px; color: var(--ct-text-light); letter-spacing: 1px; font-style: italic;">
        a SuperStories tool
    </p>
</div>
{% endblock %}
